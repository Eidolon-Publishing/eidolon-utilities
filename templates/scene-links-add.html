<form class="scene-links-add-form">
  <div class="form-group">
    <label>{{labels.target}}</label>
    <div class="scene-links-picker">
      <div class="scene-links-picker__modes">
        <button type="button" class="scene-links-picker__mode active" data-picker-mode="browse" title="{{labels.browseTitle}}">
          <i class="fa-solid fa-folder-tree"></i>
        </button>
        <button type="button" class="scene-links-picker__mode" data-picker-mode="uuid" title="{{labels.uuidTitle}}">
          <i class="fa-solid fa-keyboard"></i>
        </button>
        <button type="button" class="scene-links-picker__mode" data-picker-mode="sidebar" title="{{labels.sidebarTitle}}">
          <i class="fa-solid fa-hand-pointer"></i>
        </button>
      </div>

      <div class="scene-links-picker__panel" data-panel="browse">
        <div class="eidutil-scene-picker">
          <input type="text" class="eidutil-scene-search" placeholder="Search scenes…" autocomplete="off" />
          <a class="eidutil-scene-clear" style="display:none"><i class="fa-solid fa-xmark"></i></a>
        </div>
        {{!-- dropdown is appended to document.body by JS for proper overlay --}}
        <template class="eidutil-scene-dropdown-data">
          {{#each groups}}
            <div class="eidutil-scene-group-label" data-folder="{{path}}">{{path}}</div>
            {{#each scenes}}
              <a class="eidutil-scene-option" data-id="{{id}}"><i class="fa-solid fa-map"></i> {{name}}</a>
            {{/each}}
          {{/each}}
        </template>
      </div>

      <div class="scene-links-picker__panel" data-panel="uuid" style="display:none">
        <input type="text" name="targetUuid" placeholder="Scene ID or Scene.xxxxx" />
      </div>

      <div class="scene-links-picker__panel" data-panel="sidebar" style="display:none">
        <div class="scene-links-picker__sidebar-status">
          <span class="scene-links-picker__sidebar-waiting">{{labels.sidebarWaiting}}</span>
          <span class="scene-links-picker__sidebar-selected" style="display:none"></span>
        </div>
      </div>
    </div>
    <input type="hidden" name="target" />
  </div>

  <div class="form-group">
    <label>{{labels.label}}</label>
    <input type="text" name="label" placeholder="e.g. Exterior, Roof, Tower" />
  </div>

  <hr />

  <div class="form-group">
    <label class="checkbox">
      <input type="checkbox" name="reverse" checked />
      {{labels.reverseLink}}
    </label>
  </div>
  <div class="form-group" data-reverse-label-group>
    <label>{{labels.reverseLabel}}</label>
    <input type="text" name="reverseLabel" value="{{sceneName}}" />
  </div>

  <footer class="sheet-footer">
    <button type="button" data-action="cancel">{{labels.cancel}}</button>
    <button type="submit">{{labels.add}}</button>
  </footer>
</form>
